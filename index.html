<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Promoción Exclusiva 2026</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1d3557,#457b9d);
color:white;
text-align:center;
margin:0;
}

.container{
margin-top:60px;
}

.card{
background:white;
color:black;
width:350px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
display:block;
width:90%;
margin:10px auto;
padding:10px;
}

button{
padding:10px 20px;
background:#e63946;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#c1121f;
}

#codigoSection,#ruletaSection,#verificacionSection,#premioSection{
display:none;
}

#ruleta{
font-size:40px;
animation:giro 0.8s infinite linear;
}

@keyframes giro{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#barraContainer{
width:300px;
height:20px;
background:#ccc;
margin:20px auto;
border-radius:10px;
overflow:hidden;
}

#barra{
height:100%;
width:0%;
background:#2ecc71;
}

img{
margin-top:20px;
max-width:300px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎁 PROMOCIÓN EXCLUSIVA 🎁</h1>
<p>Quedan <b id="premiosRestantes"></b> premios disponibles</p>

<div class="card" id="formSection">

<h3>Registro de participante</h3>

<p>Participación Nº <b id="ticket"></b></p>

<input id="nombre" placeholder="Nombre completo">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">

<button onclick="enviarDatos()">Participar</button>

</div>


<div class="card" id="codigoSection">

<h3>Introduce tu código ganador</h3>

<input id="codigo" placeholder="Código promocional">
<button onclick="verificarCodigo()">Validar código</button>

</div>


<div class="card" id="ruletaSection">

<h3>Seleccionando premio...</h3>

<div id="ruleta">🎰</div>

<p>Procesando participación...</p>

</div>


<div class="card" id="verificacionSection">

<h3 id="mensaje">Verificando datos...</h3>

<div id="barraContainer">
<div id="barra"></div>
</div>

</div>


<div class="card" id="premioSection">

<h1>🎊 ¡FELICIDADES! 🎊</h1>

<p>Has ganado un premio valorado en <b>10.000€</b></p>

<p id="broma"></p>

<img src="premio.png">

</div>

</div>


<audio id="jackpot">
<source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>


<script>

const ticket = Math.floor(Math.random()*900000+100000)
document.getElementById("ticket").innerText = ticket

const premios = Math.floor(Math.random()*5+2)
document.getElementById("premiosRestantes").innerText = premios


function enviarDatos(){

const datos = {

nombre:document.getElementById("nombre").value,
direccion:document.getElementById("direccion").value,
telefono:document.getElementById("telefono").value,
ticket:ticket

}

localStorage.setItem("participante",JSON.stringify(datos))

document.getElementById("formSection").style.display="none"
document.getElementById("codigoSection").style.display="block"

}


function verificarCodigo(){

const codigo = document.getElementById("codigo").value

if(codigo !== "DEGOLONGO-PRIME-777"){

alert("Código incorrecto")

return

}

document.getElementById("codigoSection").style.display="none"
document.getElementById("ruletaSection").style.display="block"

setTimeout(iniciarVerificacion,3000)

}


function iniciarVerificacion(){

document.getElementById("ruletaSection").style.display="none"
document.getElementById("verificacionSection").style.display="block"

const barra = document.getElementById("barra")
const mensaje = document.getElementById("mensaje")

const mensajes=[

"Validando identidad...",
"Consultando base de datos internacional...",
"Comprobando elegibilidad...",
"Confirmando premio...",
"Preparando recompensa..."

]

let progreso=0
let paso=0

const intervalo=setInterval(()=>{

progreso+=5
barra.style.width=progreso+"%"

if(progreso%20===0 && paso<mensajes.length){

mensaje.innerText=mensajes[paso]
paso++

}

if(progreso>=100){

clearInterval(intervalo)

mostrarPremio()

}

},150)

}


function mostrarPremio(){

document.getElementById("verificacionSection").style.display="none"
document.getElementById("premioSection").style.display="block"

document.getElementById("jackpot").play()

setTimeout(()=>{

document.getElementById("broma").innerText="(Vale... no son 10.000€, pero tienes este vale 😎)"

},2000)

}

</script>

</body>
</html>
